services:
  - type: web
    name: rnews
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render generates and persists a random value
      - key: DATABASE_URL
        fromDatabase:
          name: rnews-db
          property: connectionString
      - key: RENDER
        value: "1"

databases:
  - name: rnews-db
    plan: free
